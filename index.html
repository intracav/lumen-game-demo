<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lumen — Clinical AI Hospital Floor</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#020810;--panel:#040e1c;--border:#0e1c38;--border2:#1a3460;
  --cyan:#00d4ff;--green:#00ff9f;--amber:#ffaa00;--red:#ff3355;
  --purple:#bb66ff;--pink:#ff4488;--blue:#4499ff;
  --text:#6898b8;--hi:#bcd8f0;--lo:#2a4060;
  --mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden;touch-action:none;}
#app{display:flex;flex-direction:column;height:100dvh;}

/* ─── TOP BAR ─── */
#topbar{height:48px;background:rgba(4,14,28,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:30;}
.lm{width:28px;height:28px;background:var(--cyan);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:bold;color:#020810;flex-shrink:0;}
.logo-t .ln{font-family:var(--mono);font-size:12px;letter-spacing:3px;color:var(--hi);}
.logo-t .ls{font-size:8px;letter-spacing:2px;color:var(--text);margin-top:1px;}
.chip{display:flex;align-items:center;gap:5px;background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.14);border-radius:3px;padding:3px 7px;font-family:var(--mono);font-size:9px;color:var(--text);white-space:nowrap;}
.chip b{color:var(--cyan);}
.pd{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#tbr{margin-left:auto;display:flex;align-items:center;gap:8px;}
.clk{font-family:var(--mono);font-size:13px;color:var(--cyan);letter-spacing:2px;}
.hint{font-family:var(--mono);font-size:8px;color:rgba(0,212,255,.3);letter-spacing:.8px;}

/* ─── MAIN ─── */
#main{flex:1;display:flex;overflow:hidden;min-height:0;}

/* ─── CANVAS ─── */
#cw{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#gc{display:block;touch-action:none;}
#gc.grab{cursor:grab;}#gc.grabbing{cursor:grabbing;}#gc.pointer{cursor:pointer;}#gc.move-cur{cursor:move;}

/* ─── TOOLTIP ─── */
#tt{position:absolute;background:rgba(4,14,28,.97);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;font-family:var(--mono);font-size:9px;color:var(--cyan);pointer-events:none;display:none;z-index:25;letter-spacing:1px;max-width:200px;}

/* ─── PANELS ─── */
.panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#lpanel{width:210px;border-right:1px solid var(--border);}
#rpanel{width:228px;border-left:1px solid var(--border);}
.ph{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--cyan);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ph::before{content:'';width:2px;height:10px;background:var(--cyan);border-radius:2px;display:block;}
.pscroll{flex:1;overflow-y:auto;padding:6px;}
.pscroll::-webkit-scrollbar{width:2px;}
.pscroll::-webkit-scrollbar-thumb{background:var(--border);}

/* ─── SELECTION PANEL ─── */
.sel-empty{font-size:9px;font-family:var(--mono);color:var(--lo);text-align:center;padding:16px 8px;letter-spacing:1px;line-height:1.8;}
.sel-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.sc-head{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);}
.sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sc-name{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--hi);flex:1;}
.sc-badge{font-size:7px;font-family:var(--mono);padding:2px 4px;border-radius:2px;letter-spacing:.5px;}
.bw{background:rgba(0,255,159,.1);color:var(--green);border:1px solid rgba(0,255,159,.25);}
.br{background:rgba(255,170,0,.1);color:var(--amber);border:1px solid rgba(255,170,0,.25);}
.bi{background:rgba(100,150,200,.07);color:var(--text);border:1px solid var(--border);}
.sc-body{padding:8px 10px;}
.sc-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.sc-lbl{font-size:8px;color:var(--lo);}
.sc-val{font-family:var(--mono);font-size:9px;color:var(--hi);}
.sc-task{font-size:8px;font-family:var(--mono);color:var(--cyan);margin-top:4px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-prog{height:2px;background:var(--border);border-radius:1px;margin-top:5px;overflow:hidden;}
.sc-pf{height:100%;border-radius:1px;transition:width .4s;}
.act-btns{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;border-top:1px solid var(--border);}
.abtn{flex:1;min-width:56px;font-family:var(--mono);font-size:8px;letter-spacing:.5px;padding:5px 4px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--text);transition:all .12s;text-align:center;white-space:nowrap;}
.abtn:hover{border-color:rgba(0,212,255,.35);color:var(--cyan);background:rgba(0,212,255,.07);}
.abtn.primary{border-color:rgba(0,212,255,.3);color:var(--cyan);}
.abtn.danger{border-color:rgba(255,51,85,.2);color:var(--red);}
.abtn.green{border-color:rgba(0,255,159,.25);color:var(--green);}

/* Room info card */
.rc-icon{font-size:20px;margin-bottom:4px;}
.rc-name{font-family:var(--mono);font-size:10px;color:var(--hi);font-weight:700;}
.rc-type{font-size:8px;color:var(--lo);margin-top:1px;letter-spacing:1px;}
.rc-body{padding:8px 10px;}
.rc-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.rc-k{font-size:8px;color:var(--lo);}
.rc-v{font-family:var(--mono);font-size:9px;color:var(--hi);}
.rc-agents{font-size:8px;font-family:var(--mono);color:var(--cyan);margin-top:4px;line-height:1.6;}

/* ─── AGENT ROSTER ─── */
.acard{background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:4px;padding:7px 9px;margin-bottom:4px;cursor:pointer;transition:all .15s;}
.acard:hover{border-color:rgba(0,212,255,.22);background:rgba(0,212,255,.04);}
.acard.selected{border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.07);box-shadow:0 0 10px rgba(0,212,255,.07);}
.acard.working{border-color:rgba(0,255,159,.22);background:rgba(0,255,159,.03);}
.at{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.aname{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--hi);flex:1;}
.abg{font-size:7px;font-family:var(--mono);padding:2px 4px;border-radius:2px;letter-spacing:.5px;}
.arole{font-size:9px;color:var(--lo);margin-bottom:2px;}
.atask{font-size:8px;color:var(--cyan);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.75;}
.apb{height:1.5px;background:var(--border);border-radius:1px;margin-top:4px;overflow:hidden;}
.apbf{height:100%;border-radius:1px;transition:width .3s;}

/* ─── BOTTOM LOG ─── */
#bpanel{height:110px;background:var(--panel);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#ll{flex:1;overflow-y:auto;padding:3px 12px 4px;}
#ll::-webkit-scrollbar{width:2px;}
#ll::-webkit-scrollbar-thumb{background:var(--border);}
.le{display:flex;align-items:baseline;gap:7px;padding:1.5px 0;font-family:var(--mono);font-size:8.5px;border-bottom:1px solid rgba(14,28,53,.5);}
.lt{color:rgba(100,150,180,.3);min-width:42px;}
.lag{min-width:36px;font-weight:bold;}
.lmsg{color:var(--text);flex:1;font-size:8px;opacity:.85;}

/* ─── CONTEXT MENU ─── */
#ctx{position:fixed;z-index:600;background:#050f1e;border:1px solid var(--border2);border-radius:5px;min-width:188px;padding:4px 0;box-shadow:0 8px 40px rgba(0,0,0,.8);display:none;}
.ctx-hd{padding:6px 12px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--cyan);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.ctx-dot{width:6px;height:6px;border-radius:50%;}
.ctx-item{padding:7px 12px;font-family:var(--mono);font-size:9px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .1s;letter-spacing:.3px;}
.ctx-item:hover{background:rgba(0,212,255,.08);color:var(--hi);}
.ctx-item.red:hover{background:rgba(255,51,85,.07);color:var(--red);}
.ctx-item.grn:hover{background:rgba(0,255,159,.07);color:var(--green);}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.ctx-ico{width:14px;text-align:center;font-size:11px;}
.ctx-sub{color:var(--lo);font-size:8px;margin-left:auto;}

/* ─── STATION MODAL ─── */
#modal{position:fixed;inset:0;background:rgba(2,8,16,.9);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;backdrop-filter:blur(6px);}
#modal.h{display:none;}
.mbox{width:100%;max-width:520px;background:#050f1e;border:1px solid var(--border2);border-radius:7px;overflow:hidden;max-height:calc(100dvh - 32px);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,212,255,.07);}
.mhd{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(0,212,255,.02);flex-shrink:0;}
.mico{font-size:18px;}
.mtt{flex:1;}
.mtt h2{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--hi);font-weight:normal;}
.mtt p{font-size:9px;color:var(--text);margin-top:1px;}
.mcls{background:none;border:1px solid var(--border);color:var(--text);width:24px;height:24px;border-radius:3px;cursor:pointer;font-size:12px;transition:all .12s;flex-shrink:0;}
.mcls:hover{border-color:var(--red);color:var(--red);}
.mb{padding:12px 14px;overflow-y:auto;flex:1;}
.mb::-webkit-scrollbar{width:2px;}
.mb::-webkit-scrollbar-thumb{background:var(--border);}
.mag{display:flex;align-items:center;gap:7px;padding:7px 9px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:3px;margin-bottom:9px;}
.mag-d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mag-n{font-family:var(--mono);font-size:10px;flex:1;color:var(--hi);}
.ltag{font-family:var(--mono);font-size:7px;color:var(--green);border:1px solid rgba(0,255,159,.3);padding:2px 4px;border-radius:2px;animation:blink 1.4s infinite;letter-spacing:1px;}
.aout{background:#020710;border:1px solid rgba(0,212,255,.1);border-radius:3px;padding:10px;font-family:var(--mono);font-size:9px;color:var(--green);min-height:95px;max-height:130px;overflow-y:auto;line-height:1.65;white-space:pre-wrap;}
.aout::-webkit-scrollbar{width:2px;}
.mstats{display:flex;gap:6px;margin-top:8px;}
.mst{flex:1;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:3px;padding:6px;text-align:center;}
.mst .sv{font-family:var(--mono);font-size:14px;color:var(--cyan);display:block;}
.mst .sl{font-size:7px;color:var(--lo);letter-spacing:1px;margin-top:1px;}
.rbtn{margin-top:8px;width:100%;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.25);color:var(--cyan);font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:9px;border-radius:3px;cursor:pointer;transition:all .15s;}
.rbtn:hover{background:rgba(0,212,255,.12);border-color:var(--cyan);}
.rbtn:disabled{opacity:.35;cursor:default;}

/* Interaction flash effect */
.flash{animation:flash .4s ease-out;}
@keyframes flash{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}

/* ─── MOBILE BOTTOM SHEET ─── */
#mbtm{display:none;flex-direction:column;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;overflow:hidden;height:200px;}
#dh{width:100%;height:18px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;flex-shrink:0;}
#dh::before{content:'';width:28px;height:2.5px;background:var(--border2);border-radius:2px;}
#mtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.mt{flex:1;height:38px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--text);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;gap:5px;letter-spacing:1px;}
.mt.active{color:var(--cyan);border-bottom-color:var(--cyan);}
#mc{flex:1;overflow:hidden;min-height:0;}
#ma,#mlog{display:none;height:100%;overflow-y:auto;padding:5px 8px;}
#ma.active,#mlog.active{display:block;}

@media(max-width:767px){
  #lpanel,#rpanel,#bpanel{display:none;}
  #mbtm{display:flex;}
  .d-only{display:none!important;}
}
@media(max-width:380px){#topbar{height:42px;}}
@media(orientation:landscape)and(max-height:480px){#mbtm{height:120px!important;}.aout{min-height:60px;max-height:80px;}}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="topbar">
  <div style="display:flex;align-items:center;gap:8px;margin-right:6px">
    <div class="lm">L</div>
    <div class="logo-t"><div class="ln">LUMEN</div><div class="ls d-only">CLINICAL AI HOSPITAL</div></div>
  </div>
  <div class="chip d-only">FLOOR <b>CARDIOLOGY · ICU</b></div>
  <div class="chip"><div class="pd"></div><b id="sc-a">6</b></div>
  <div class="chip d-only">TASKS <b id="sc-t">0</b></div>
  <div class="chip d-only">ALERTS <b id="sc-al" style="color:var(--red)">0</b></div>
  <div id="tbr">
    <span class="hint d-only">DRAG AGENT · RIGHT-CLICK FOR ACTIONS · CLICK ROOM TO INSPECT</span>
    <div class="clk" id="clk">--:--:--</div>
  </div>
</div>

<div id="main">
  <!-- LEFT: Selection -->
  <div id="lpanel" class="panel">
    <div class="ph">SELECTION</div>
    <div class="pscroll" id="sel-panel">
      <div class="sel-empty">Click any<br>agent or room<br>to inspect</div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="cw">
    <canvas id="gc"></canvas>
    <div id="tt"></div>
  </div>

  <!-- RIGHT: Agent roster -->
  <div id="rpanel" class="panel">
    <div class="ph">AGENT ROSTER</div>
    <div class="pscroll" id="al"></div>
  </div>
</div>

<!-- BOTTOM LOG -->
<div id="bpanel" class="panel" style="height:110px;border-top:1px solid var(--border);">
  <div class="ph">ACTIVITY LOG</div>
  <div id="ll"></div>
</div>

<!-- MOBILE BOTTOM SHEET -->
<div id="mbtm">
  <div id="dh"></div>
  <div id="mtabs">
    <button class="mt active" data-t="a" onclick="switchTab('a')">🤖 AGENTS</button>
    <button class="mt" data-t="log" onclick="switchTab('log')">📡 LOG</button>
    <button class="mt" data-t="sel" onclick="switchTab('sel')">🔍 INSPECT</button>
  </div>
  <div id="mc">
    <div id="ma" class="active"></div>
    <div id="mlog"></div>
    <div id="msel" style="display:none;height:100%;overflow-y:auto;padding:6px;"></div>
  </div>
</div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx"></div>

<!-- STATION / ROOM MODAL -->
<div id="modal" class="h">
  <div class="mbox">
    <div class="mhd">
      <span class="mico" id="m-ico">🏥</span>
      <div class="mtt"><h2 id="m-title">ROOM</h2><p id="m-sub">Detail</p></div>
      <button class="mcls" onclick="closeModal()">✕</button>
    </div>
    <div class="mb">
      <div class="mag" id="m-agent-row">
        <div class="mag-d" id="m-dot"></div>
        <span class="mag-n" id="m-aname">—</span>
        <span class="ltag">● LIVE</span>
      </div>
      <div class="aout" id="m-out">—</div>
      <div class="mstats">
        <div class="mst"><span class="sv" id="ms-t">0</span><div class="sl">TASKS</div></div>
        <div class="mst"><span class="sv" id="ms-a">—</span><div class="sl">ACCURACY</div></div>
        <div class="mst"><span class="sv" id="ms-l">—</span><div class="sl">LATENCY</div></div>
      </div>
      <button class="rbtn" id="run-btn" onclick="runTask()">▶ DISPATCH TASK</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════
//  GRID & TILE CONFIG
// ══════════════════════════════════════════════════════════════
const GW=22, GH=16;
let TW=64, TH=32;
const SPD=0.045;

function calcTileSize(){
  const m=window.innerWidth<768, l=m&&window.innerHeight<500;
  if(l)return{TW:36,TH:18}; if(m)return{TW:46,TH:23}; return{TW:64,TH:32};
}

// ══════════════════════════════════════════════════════════════
//  ROOM LAYOUT
// ══════════════════════════════════════════════════════════════
const ROOMS=[
  // --- Agent Private Offices (top row) ---
  {id:'aria_office', name:"ARIA's Office",     type:'office',    icon:'🖥️',  x1:1,y1:1,x2:3,y2:3,  agentId:'aria',color:'#00d4ff'},
  {id:'nova_lab',    name:"NOVA Lab",           type:'office',    icon:'🧠',  x1:4,y1:1,x2:6,y2:3,  agentId:'nova',color:'#00ff9f'},
  {id:'deid_vault',  name:"De-ID Vault",        type:'office',    icon:'🔐',  x1:7,y1:1,x2:9,y2:3,  agentId:'deid',color:'#ffaa00'},
  {id:'iris_suite',  name:"Imaging Suite",      type:'office',    icon:'🩻',  x1:10,y1:1,x2:12,y2:3,agentId:'iris',color:'#bb66ff'},
  {id:'notes_room',  name:"Scribe Room",        type:'office',    icon:'📋',  x1:13,y1:1,x2:15,y2:3,agentId:'clio',color:'#ff4488'},
  {id:'vitals_hub',  name:"Vitals Hub",         type:'office',    icon:'💓',  x1:16,y1:1,x2:18,y2:3,agentId:'vega',color:'#4499ff'},
  // --- Middle wing ---
  {id:'conference',  name:"Conference Room",    type:'conference',icon:'📊',  x1:0,y1:5,x2:5,y2:10, color:'#2a3d66'},
  {id:'nurses_stn',  name:"Nurses Station",     type:'nurses',    icon:'🏥',  x1:17,y1:5,x2:21,y2:10,color:'#0099cc'},
  {id:'pt101',       name:"Patient Rm 101",     type:'patient',   icon:'🛏️',  x1:6,y1:5,x2:9,y2:7,  patient:'PT-4782',color:'#2a4a6a'},
  {id:'pt102',       name:"Patient Rm 102",     type:'patient',   icon:'🛏️',  x1:10,y1:5,x2:13,y2:7,patient:'PT-4783',color:'#2a4a6a'},
  {id:'pt103',       name:"Patient Rm 103",     type:'patient',   icon:'🛏️',  x1:14,y1:5,x2:16,y2:7,patient:'PT-4784',color:'#2a4a6a'},
  {id:'pt104',       name:"Patient Rm 104",     type:'patient',   icon:'🛏️',  x1:6,y1:8,x2:9,y2:10, patient:'PT-4785',color:'#2a4a6a'},
  {id:'pt105',       name:"Patient Rm 105",     type:'patient',   icon:'🛏️',  x1:10,y1:8,x2:13,y2:10,patient:'PT-4786',color:'#2a4a6a'},
  {id:'break_room',  name:"Break Room",         type:'break',     icon:'☕',  x1:14,y1:8,x2:16,y2:10,color:'#336633'},
  // --- Lower wing ---
  {id:'pt201',       name:"Patient Rm 201",     type:'patient',   icon:'🛏️',  x1:0,y1:12,x2:4,y2:14, patient:'PT-4787',color:'#2a4a6a'},
  {id:'pt202',       name:"Patient Rm 202",     type:'patient',   icon:'🛏️',  x1:5,y1:12,x2:9,y2:14, patient:'PT-4788',color:'#2a4a6a'},

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let CW,CH,OX,OY;
const cam={x:0,y:0};

function doResize(){
  const t=calcTileSize();TW=t.TW;TH=t.TH;
  const wrap=document.getElementById('cw');
  CW=wrap.clientWidth;CH=wrap.clientHeight;
  canvas.width=CW;canvas.height=CH;
  const mob=window.innerWidth<768;
  OX=CW/2+(mob?0:18);
  OY=mob?34:52;
}

// Grid→screen
function ts(gx,gy){return{x:(gx-gy)*(TW/2)+OX+cam.x, y:(gx+gy)*(TH/2)+OY+cam.y};}
// Screen→grid (fractional)
function sg(sx,sy){
  const ax=sx-OX-cam.x, ay=sy-OY-cam.y;
  return{gx:(ax/TW+ay/TH), gy:(ay/TH-ax/TW)};
}

// ══════════════════════════════════════════════════════════════
//  DRAW PRIMITIVES
// ══════════════════════════════════════════════════════════════
function diamond(gx,gy,fill,stroke,lw=0.5){
  const{x,y}=ts(gx,gy);const hw=TW/2,hh=TH/2;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+hw,y+hh);ctx.lineTo(x,y+TH);ctx.lineTo(x-hw,y+hh);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function wallV(gx,gy,h,col){
  // Vertical wall going to the right of tile gx,gy (faces viewer from bottom-right)
  const A=ts(gx+1,gy), B=ts(gx+1,gy+1);
  ctx.beginPath();
  ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);
  ctx.lineTo(B.x,B.y-h);ctx.lineTo(A.x,A.y-h);
  ctx.closePath();ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=.4;ctx.stroke();
}

function wallH(gx,gy,h,col){
  // Horizontal wall going down from tile gx,gy (faces viewer from bottom-left)
  const A=ts(gx,gy+1), B=ts(gx+1,gy+1);
  ctx.beginPath();
  ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);
  ctx.lineTo(B.x,B.y-h);ctx.lineTo(A.x,A.y-h);
  ctx.closePath();ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=.4;ctx.stroke();
}

// Draw a raised ISO box spanning screen positions
function isoBoxPts(tlx,tly,trx,try_,brx,bry,blx,bly,h,topC,rtC,ltC,outC){
  // Top face
  ctx.beginPath();ctx.moveTo(tlx,tly-h);ctx.lineTo(trx,try_-h);ctx.lineTo(brx,bry-h);ctx.lineTo(blx,bly-h);ctx.closePath();
  ctx.fillStyle=topC;ctx.fill();if(outC){ctx.strokeStyle=outC;ctx.lineWidth=.6;ctx.stroke();}
  // Right face (tr→br down)
  ctx.beginPath();ctx.moveTo(trx,try_-h);ctx.lineTo(brx,bry-h);ctx.lineTo(brx,bry);ctx.lineTo(trx,try_);ctx.closePath();
  ctx.fillStyle=rtC;ctx.fill();if(outC){ctx.strokeStyle=outC;ctx.lineWidth=.5;ctx.stroke();}
  // Left face (bl→br down)
  ctx.beginPath();ctx.moveTo(blx,bly-h);ctx.lineTo(brx,bry-h);ctx.lineTo(brx,bry);ctx.lineTo(blx,bly);ctx.closePath();
  ctx.fillStyle=ltC;ctx.fill();if(outC){ctx.strokeStyle=outC;ctx.lineWidth=.5;ctx.stroke();}
}

function isoBox(x1,y1,x2,y2,h,topC,rtC,ltC,outC){
  const TL=ts(x1,y1),TR=ts(x2,y1),BR=ts(x2,y2),BL=ts(x1,y2);
  isoBoxPts(TL.x,TL.y,TR.x,TR.y,BR.x,BR.y,BL.x,BL.y,h,topC,rtC,ltC,outC);
}

function hexBright(h,amt){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  const c=(v)=>Math.max(0,Math.min(255,v+amt));
  return`rgb(${c(r)},${c(g)},${c(b)})`;
}

function floorColor(room){
  const base={office:'#040e1c',conference:'#050a14',patient:'#040912',nurses:'#030c16',break:'#060c05',supply:'#0a0804'};
  return base[room.type]||'#040c18';
}

function drawRoomFloor(room){
  const alt=(room.x1+room.y1)%2===0;
  const fc=floorColor(room);
  for(let x=room.x1;x<=room.x2;x++){
    for(let y=room.y1;y<=room.y2;y++){
      const col=((x+y)%2===0)?fc:hexBright(fc,3);
      diamond(x,y,col,null);
    }
  }
  // Room-color tinted border tiles
  for(let x=room.x1;x<=room.x2;x++){
    for(let y=room.y1;y<=room.y2;y++){
      const edge=(x===room.x1||x===room.x2||y===room.y1||y===room.y2);
      if(edge){
        diamond(x,y,room.color+'0a',room.color+'33',.4);
      }
    }
  }
}

function drawRoomLabel(room){
  const cx=(room.x1+room.x2)/2, cy=(room.y1+room.y2)/2;
  const p=ts(cx,cy);
  ctx.save();
  ctx.textAlign='center';
  const fs=Math.max(6,TW*.105);
  ctx.font=`${fs}px var(--mono)`;
  ctx.fillStyle=room.color+'bb';
  ctx.shadowColor=room.color;ctx.shadowBlur=6;
  ctx.fillText(room.icon||'',p.x,p.y+TH/2-6);
  if(TW>40){
    ctx.shadowBlur=0;
    ctx.font=`${Math.max(5,fs*.8)}px var(--mono)`;
    ctx.fillStyle=room.color+'77';
    ctx.fillText(room.name,p.x,p.y+TH/2+fs+2);
  }
  ctx.restore();
}

function drawFurniture(room){
  const mx=(room.x1+room.x2)/2, my=(room.y1+room.y2)/2;

      // Monitor
      const mp=ts(dx+.1,dy+.1);
      ctx.fillStyle='#020a12';ctx.fillRect(mp.x-7,mp.y-bh-15,14,11);
      ctx.fillStyle=c+'cc';ctx.fillRect(mp.x-6,mp.y-bh-14,12,9);

    }

      const bw=1.4,bd=.65,bx=mx-.7,by=my-.3;
      isoBox(bx,by,bx+bw,by+bd,bh,'#d0e8ff','#a0c0e0','#80a8cc','#ffffff25');
      // Pillow
      const pp=ts(bx,by);
      ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.beginPath();ctx.ellipse(pp.x+TW*.15,pp.y-bh+2,TW*.07,TH*.06,0,0,Math.PI*2);ctx.fill();
      // Blanket color tint
      isoBox(bx+.3,by,bx+bw,by+bd,bh*.6,room.color+'15',room.color+'10',room.color+'08',null);
      // IV pole
      const ivp=ts(bx+bw+.15,by);
      ctx.strokeStyle='rgba(180,200,220,.5)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(ivp.x,ivp.y);ctx.lineTo(ivp.x,ivp.y-TH*1.4);ctx.stroke();
      ctx.fillStyle='rgba(0,212,255,.35)';ctx.fillRect(ivp.x-5,ivp.y-TH*1.4-7,10,7);
      // Patient ID
      const pidp=ts(mx,my);
      ctx.font=`${Math.max(6,TW*.09)}px var(--mono)`;ctx.textAlign='center';
      ctx.fillStyle='rgba(120,180,220,.45)';
      if(TW>42)ctx.fillText(room.patient||'',pidp.x,pidp.y-bh*1.2);
      break;
    }
    case 'conference':{
      const tw=2.6,td=2.2;
      isoBox(mx-tw/2,my-td/2,mx+tw/2,my+td/2,bh*.55,'#121c30','#0a1220','#08101c','#2a3d5533');
      // Screen on back wall
      const sp=ts(mx-.5,room.y1+.1);
      ctx.fillStyle='#003366bb';ctx.fillRect(sp.x-2,sp.y-bh*.55-22,4,18);
      ctx.fillStyle='#0066cc55';ctx.fillRect(sp.x-1.5,sp.y-bh*.55-21,3,16);
      // Chairs around table
      [[-1.2,0],[1.1,0],[0,-1.1],[0,1.0],[-.8,-.7],[.8,-.7],[-.8,.7],[.8,.7]].forEach(([ox,oy])=>{
        isoBox(mx+ox-.15,my+oy-.15,mx+ox+.15,my+oy+.15,bh*.38,'#1c2c44','#121e30','#0e1828',null);
      });
      break;
    }
    case 'nurses':{
      // L-shaped counter
      isoBox(room.x1+.1,room.y1+.1,room.x1+2.5,room.y1+.5,bh,'#051624','#030e18','#020a12','#0099cc33');
      isoBox(room.x1+.1,room.y1+.1,room.x1+.5,room.y1+2.8,bh,'#051624','#030e18','#020a12','#0099cc33');
      // Monitors on counter
      for(let i=0;i<3;i++){

      isoBox(mx-.5,my-.5,mx+.5,my+.5,bh*.35,'#1a2e14','#101e0c','#0c1808',null);
      [[-0.7,.0],[.0,-.7],[.6,.0],[.0,.6]].forEach(([ox,oy])=>{

      for(let i=0;i<2;i++){
        isoBox(room.x1+.1,room.y1+.2+i*.7,room.x1+.85,room.y1+.5+i*.7,bh,'#1a0e06','#100a04','#0c0802','#55330022');

}

// ══════════════════════════════════════════════════════════════
//  WALL RENDERING
// ══════════════════════════════════════════════════════════════
const WH=TH*1.6; // wall height (will scale with TH)

function drawAllWalls(){
  const wh=TH*1.6;
  // We must draw walls in painter's order (back→front)
  // Draw along columns first (right-face walls), then rows (left-face walls)
  for(let sum=0;sum<=GW+GH-2;sum++){
    for(let gx=0;gx<GW;gx++){
      const gy=sum-gx;if(gy<0||gy>=GH)continue;
      const rid=RMAP[gx]&&RMAP[gx][gy];
      const room=rid?getRoomById(rid):null;
      if(!room)continue;
      // Right boundary wall (between gx and gx+1)
      if(gx===room.x2){
        const nextRid=gx+1<GW?RMAP[gx+1][gy]:null;
        if(nextRid!==rid){
          // Choose wall color based on current room
          const wc=hexBright(room.color,-70)+'dd';
          const wc2=hexBright(room.color,-80)+'cc';
          const A=ts(gx+1,gy),B=ts(gx+1,gy+1);
          ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.lineTo(B.x,B.y-wh);ctx.lineTo(A.x,A.y-wh);ctx.closePath();
          ctx.fillStyle=wc;ctx.fill();
          ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.5;ctx.stroke();
          // Window on office rooms
          if(room.type==='office'&&TW>44){
            const wx=A.x+(B.x-A.x)*.3,wy=(A.y+B.y)/2-wh*.55;
            ctx.fillStyle=room.color+'22';ctx.fillRect(wx-3,wy,6,wh*.25);
            ctx.strokeStyle=room.color+'55';ctx.lineWidth=.5;ctx.strokeRect(wx-3,wy,6,wh*.25);
          }
        }
      }
      // Bottom boundary wall (between gy and gy+1)
      if(gy===room.y2){
        const nextRid=gy+1<GH?RMAP[gx][gy+1]:null;
        if(nextRid!==rid){
          const wc=hexBright(room.color,-80)+'bb';
          const A=ts(gx,gy+1),B=ts(gx+1,gy+1);
          ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.lineTo(B.x,B.y-wh);ctx.lineTo(A.x,A.y-wh);ctx.closePath();
          ctx.fillStyle=wc;ctx.fill();
          ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  AGENT CLASS
// ══════════════════════════════════════════════════════════════
class Agent{
  constructor(def){
    Object.assign(this,def);
    const hr=getRoomById(def.home);
    const hx=(hr.x1+hr.x2)/2-.3, hy=(hr.y1+hr.y2)/2+.4;
    this.x=hx;this.y=hy;
    this.tx=hx;this.ty=hy;
    this.state='idle';    // idle|walking|working|chatting|dragged
    this.tRoom=def.home;
    this.prevRoom=def.home;
    this.workTimer=0;
    this.idleTimer=Math.random()*120+60;
    this.task='';
    this.taskProgress=0;
    this.particles=[];
    this.chatBubble=null;
    this.chatTimer=0;
    this.tasksDone=0;
    this.alertCount=0;
    this.selected=false;
    this.emotion='neutral'; // neutral|happy|busy|alert
    this.pathColor=def.color;
    this.flashTimer=0;
    this.collab=null; // who we're currently collaborating with
  }

  get badge(){
    if(this.state==='working')return{t:'WORKING',c:'bw'};
    if(this.state==='walking')return{t:'ROUTING',c:'br'};
    if(this.state==='chatting')return{t:'SYNC',c:'bw'};
    if(this.state==='dragged')return{t:'DRAGGED',c:'br'};
    return{t:'IDLE',c:'bi'};
  }

  update(){
    if(this.state==='dragged')return;
    this.idleTimer--;
    this.flashTimer=Math.max(0,this.flashTimer-1);

    // Particles
    if((this.state==='working'||this.state==='chatting')&&G.tick%5===0){
      this.particles.push({ox:(Math.random()-.5)*14,oy:0,life:0,c:this.color});
    }
    this.particles=this.particles.map(p=>({...p,life:p.life+.03})).filter(p=>p.life<1);

    // Chat bubble decay
    if(this.chatTimer>0){this.chatTimer--;if(this.chatTimer===0)this.chatBubble=null;}

    // Walk
    if(this.state==='walking'){
      const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.hypot(dx,dy);
      if(d>SPD){this.x+=dx/d*SPD;this.y+=dy/d*SPD;}
      else{
        this.x=this.tx;this.y=this.ty;
        if(this.tRoom==='__home__'){
          this.tRoom=this.home;
          this.state='idle';this.task='';this.idleTimer=80+Math.random()*120;
        } else {
          this.state='working';
          this.workTimer=180+Math.random()*240;
          this.taskProgress=0;
          const sd=SD[this.tRoom];
          if(sd){sd.stats.tasks++;G.taskCount++;this.task=TASK_LABELS[Math.floor(Math.random()*TASK_LABELS.length)];addLog(this.name,this.color,`▶ ${this.task} @ ${getRoomById(this.tRoom)?.name||this.tRoom}`);}
        }
      }
    }
    // Work
    else if(this.state==='working'){
      this.workTimer--;
      this.taskProgress=1-(this.workTimer/(this.workTimer+1));
      if(this.workTimer<=0){
        this.tasksDone++;
        addLog(this.name,this.color,`✓ Complete — ${getRoomById(this.tRoom)?.name||this.tRoom}`);
        this.goHome();
      }
    }
    // Idle → dispatch
    else if(this.state==='idle'&&this.idleTimer<=0){
      this.dispatch();
    }
  }

  dispatch(forceRoom){
    let target=forceRoom||null;
    if(!target){
      // 60% home, 25% wander, 15% collaborate
      const r=Math.random();
      if(r<.6) target=this.home;
      else if(r<.85){
        target=WANDER_ROOMS[Math.floor(Math.random()*WANDER_ROOMS.length)];
      } else {
        const cb=COLLAB.find(c=>c.a===this.id);
        if(cb){
          target=cb.b==='aria'?'aria_office':cb.b==='nova'?'nova_lab':cb.b==='deid'?'deid_vault':cb.b==='iris'?'iris_suite':cb.b==='clio'?'notes_room':'vitals_hub';
          const partner=G.agents.find(a=>a.id===cb.b);
          if(partner){
            addLog(this.name,this.color,`⇄ ${cb.msg}`);
            this.collab=cb.b;
            setTimeout(()=>{if(partner.state==='idle'||partner.state==='working'){partner.say(cb.msg);}},1200);
          }
        } else target=this.home;
      }
    }
    const room=getRoomById(target);
    if(room){
      this.tRoom=target;
      this.tx=(room.x1+room.x2)/2+(.15-Math.random()*.3);
      this.ty=(room.y1+room.y2)/2+(.3-Math.random()*.3);
      this.state='walking';
      this.prevRoom=this.tRoom;
    }
  }

  goHome(){
    const room=getRoomById(this.home);
    if(room){
      this.tRoom='__home__';
      this.tx=(room.x1+room.x2)/2-.2+Math.random()*.3;
      this.ty=(room.y1+room.y2)/2+.2+Math.random()*.3;
      this.state='walking';
      this.task='';
      this.collab=null;
    }
  }

  sendTo(roomId){
    this.dispatch(roomId);
  }

  say(msg){
    this.chatBubble=msg.length>28?msg.slice(0,28)+'…':msg;
    this.chatTimer=120;
  }

  flash(){this.flashTimer=30;}
}

// ══════════════════════════════════════════════════════════════
//  AGENT RENDERING
// ══════════════════════════════════════════════════════════════
function drawAgent(ag){
  const sp=ts(ag.x,ag.y);
  const px=sp.x, py=sp.y+TH/2;
  const sc=TW/64;
  const bob=ag.state==='working'?Math.sin(G.tick*.2)*1.8:ag.state==='chatting'?Math.sin(G.tick*.15)*1.2:0;
  const wlk=ag.state==='walking'?Math.sin(G.tick*.25)*2.5:0;
  const H=32*sc;
  const oy=py-H+bob+wlk;
  const glow=ag.selected||ag.flashTimer>0?1:0;
  const flashA=ag.flashTimer>0?(.3+.7*(ag.flashTimer/30)):0;

  // Selection ring
  if(ag.selected){
    ctx.beginPath();ctx.ellipse(px,py,12*sc,5*sc,0,0,Math.PI*2);
    ctx.strokeStyle=ag.color+'99';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=ag.color+'22';ctx.fill();
  }
  // Flash ring
  if(ag.flashTimer>0){
    ctx.beginPath();ctx.ellipse(px,py,14*sc*flashA,6*sc*flashA,0,0,Math.PI*2);
    ctx.strokeStyle=ag.color+Math.floor(flashA*200).toString(16).padStart(2,'0');ctx.lineWidth=2;ctx.stroke();
  }

  // Shadow
  ctx.beginPath();ctx.ellipse(px,py,8*sc,3.5*sc,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fill();

  // Legs
  const ls=ag.state==='walking'?Math.sin(G.tick*.25)*3.5:0;
  ctx.fillStyle='#0c1824';
  ctx.fillRect(px-5*sc+ls,oy+22*sc,4*sc,8*sc);
  ctx.fillRect(px+1*sc-ls,oy+22*sc,4*sc,8*sc);
  // Shoes
  ctx.fillStyle=ag.color+'66';
  ctx.fillRect(px-6*sc+ls,oy+29*sc,5*sc,2.5*sc);
  ctx.fillRect(px+.5*sc-ls,oy+29*sc,5*sc,2.5*sc);

  // Lab coat body
  if(ag.state==='working'||ag.state==='chatting'){ctx.shadowColor=ag.color;ctx.shadowBlur=12;}
  ctx.fillStyle='#d8eeff';
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(px-7*sc,oy+10*sc,14*sc,13*sc,2);
  else ctx.rect(px-7*sc,oy+10*sc,14*sc,13*sc);
  ctx.fill();ctx.shadowBlur=0;

  // Color scrub patch
  ctx.fillStyle=ag.color;ctx.fillRect(px-2.5*sc,oy+11.5*sc,5*sc,9*sc);
  // Coat lapels
  ctx.fillStyle='#c8e0f0';
  ctx.fillRect(px-6.5*sc,oy+10*sc,3*sc,9*sc);
  ctx.fillRect(px+3.5*sc,oy+10*sc,3*sc,9*sc);

  // Arms
  ctx.fillStyle='#d8eeff';
  ctx.fillRect(px-11*sc,oy+10.5*sc,4*sc,7*sc);
  ctx.fillRect(px+7*sc,oy+10.5*sc,4*sc,7*sc);

  // Neck
  ctx.fillStyle='#e0c090';ctx.fillRect(px-2*sc,oy+6*sc,4*sc,5*sc);

  // Head
  ctx.shadowColor=ag.color;ctx.shadowBlur=ag.selected?14:(ag.state==='working'?8:3);
  ctx.beginPath();ctx.arc(px,oy+4*sc,6*sc,0,Math.PI*2);
  ctx.fillStyle='#e0c090';ctx.fill();ctx.shadowBlur=0;

  // Hair
  ctx.beginPath();ctx.arc(px,oy+2*sc,6*sc,-Math.PI,0);
  ctx.fillStyle=ag.color;ctx.fill();

  // Eyes
  ctx.fillStyle='#020810';
  ctx.beginPath();ctx.arc(px-2*sc,oy+4*sc,1.2*sc,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+2*sc,oy+4*sc,1.2*sc,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath();ctx.arc(px-1.5*sc,oy+3.5*sc,.5*sc,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+2.5*sc,oy+3.5*sc,.5*sc,0,Math.PI*2);ctx.fill();

  // Name tag
  if(TW>=40){
    const fs=Math.max(6,8*sc);
    ctx.font=`bold ${fs}px var(--mono)`;ctx.textAlign='center';
    ctx.fillStyle=ag.color;ctx.shadowColor=ag.color;ctx.shadowBlur=6;
    ctx.fillText(ag.name,px,oy-4*sc);
    ctx.shadowBlur=0;
  }

  // Work particles
  if(ag.state==='working'||ag.state==='chatting'){
    for(const p of ag.particles){
      ctx.beginPath();ctx.arc(px+p.ox,oy-p.life*26*sc,1.8*sc,0,Math.PI*2);
      ctx.fillStyle=ag.color;ctx.globalAlpha=Math.max(0,.9-p.life);ctx.fill();ctx.globalAlpha=1;
    }
  }

  // Chat bubble
  if(ag.chatBubble&&ag.chatTimer>0){
    const fa=Math.min(1,ag.chatTimer/20);
    const bw=Math.min(110,ag.chatBubble.length*5.5+14);
    const bh=18,bx=px-bw/2,by=oy-H-bh-4;
    ctx.globalAlpha=fa;
    ctx.fillStyle='#050f20';ctx.strokeStyle=ag.color+'99';ctx.lineWidth=1;
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx,by,bw,bh,4);else ctx.rect(bx,by,bw,bh);
    ctx.fill();ctx.stroke();
    // tail
    ctx.beginPath();ctx.moveTo(px-4,by+bh);ctx.lineTo(px+4,by+bh);ctx.lineTo(px,by+bh+5);ctx.closePath();
    ctx.fillStyle='#050f20';ctx.fill();
    ctx.strokeStyle=ag.color+'66';ctx.lineWidth=.5;ctx.stroke();
    ctx.font=`${Math.max(6,7*sc)}px var(--mono)`;ctx.textAlign='center';
    ctx.fillStyle=ag.color;ctx.fillText(ag.chatBubble,px,by+bh-5);
    ctx.globalAlpha=1;
  }

  // Drag ghost path
  if(ag.state==='walking'){
    const tp=ts(ag.tx,ag.ty);
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(tp.x,tp.y+TH/2);
    ctx.strokeStyle=ag.color+'33';ctx.lineWidth=.8;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
    // Target marker
    ctx.beginPath();ctx.arc(tp.x,tp.y+TH/2,3,0,Math.PI*2);
    ctx.fillStyle=ag.color+'55';ctx.fill();
  }
}

// ══════════════════════════════════════════════════════════════
//  DATA PACKETS (agent–agent collab lines)
// ══════════════════════════════════════════════════════════════
const packets=[];
function spawnPacket(fromAgent,toAgent,color){
  packets.push({ax:fromAgent.x,ay:fromAgent.y,bx:toAgent.x,by:toAgent.y,t:0,color,id:Math.random()});
}
function updatePackets(){
  for(const p of packets)p.t+=.015;
  packets.splice(0,packets.length,...packets.filter(p=>p.t<=1));
}
function drawPackets(){
  for(const p of packets){
    const mx=p.ax+(p.bx-p.ax)*p.t;
    const my=p.ay+(p.by-p.ay)*p.t;
    const sp=ts(mx,my);
    // Line from start to current
    const sa=ts(p.ax,p.ay),sb=ts(p.bx,p.by);
    ctx.beginPath();ctx.moveTo(sa.x,sa.y+TH/2);ctx.lineTo(sb.x,sb.y+TH/2);
    ctx.strokeStyle=p.color+'22';ctx.lineWidth=.6;ctx.setLineDash([2,6]);ctx.stroke();ctx.setLineDash([]);
    // Packet dot
    ctx.beginPath();ctx.arc(sp.x,sp.y+TH/2,3,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
  }
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,CW,CH);
  // BG gradient
  const bg=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*.8);
  bg.addColorStop(0,'#050d1e');bg.addColorStop(1,'#020508');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);

  drawHallways();

  // Painter's order: sort by x+y
  const order=[];
  for(let sum=0;sum<GW+GH-1;sum++)
    for(let x=0;x<GW;x++){const y=sum-x;if(y>=0&&y<GH)order.push({x,y});}

  // Draw floors and room highlights
  const selRoom=G.selectedRoom?getRoomById(G.selectedRoom):null;
  const sortedRooms=[...ROOMS].sort((a,b)=>(a.x1+a.y1)-(b.x1+b.y1));
  sortedRooms.forEach(r=>drawRoomFloor(r));

  // Room highlights
  if(selRoom)drawRoomHighlight(selRoom,selRoom.color);
  G.agents.forEach(ag=>{
    if(ag.selected){
      const cr=getRoomById(ag.tRoom==='__home__'?ag.home:ag.tRoom);
      if(cr)drawRoomHighlight(cr,ag.color);
    }
  });

  // Walls (behind furniture and agents)
  drawAllWalls();
  drawDoors();

  // Furniture (painter's order)
  sortedRooms.forEach(r=>drawFurniture(r));

  // Packets
  drawPackets();

  // Agent path lines before agents
  G.agents.forEach(ag=>{
    if(ag.state==='walking'){
      const sp=ts(ag.x,ag.y),tp=ts(ag.tx,ag.ty);
      ctx.beginPath();ctx.moveTo(sp.x,sp.y+TH/2);ctx.lineTo(tp.x,tp.y+TH/2);
      ctx.strokeStyle=ag.color+'33';ctx.lineWidth=.8;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
    }
  });

  // Agents sorted back→front
  [...G.agents].sort((a,b)=>(a.x+a.y)-(b.x+b.y)).forEach(ag=>drawAgent(ag));

  // Room labels on top
  sortedRooms.forEach(r=>drawRoomLabel(r));

  // Drag ghost
  if(G.dragging&&G.dragAgent){
    const dg=G.dragAgent;
    const p=ts(G.dragGX,G.dragGY);
    ctx.beginPath();ctx.arc(p.x,p.y+TH/2,14,0,Math.PI*2);
    ctx.fillStyle=dg.color+'22';ctx.strokeStyle=dg.color+'88';ctx.lineWidth=1.2;ctx.fill();ctx.stroke();
    ctx.font=`bold ${Math.max(7,TW*.1)}px var(--mono)`;ctx.textAlign='center';
    ctx.fillStyle=dg.color+'cc';ctx.fillText('DROP',p.x,p.y+TH/2+4);
  }

  // Scanlines
  for(let sy=0;sy<CH;sy+=4){ctx.fillStyle='rgba(0,0,0,.04)';ctx.fillRect(0,sy,CW,1);}
  // Vignette
  const vig=ctx.createRadialGradient(CW/2,CH/2,CW*.25,CW/2,CH/2,CW*.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.38)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,CW,CH);
}

function addLog(name,color,msg){
  const t=new Date().toLocaleTimeString('en-US',{hour12:false});
  const html=`<div class="le"><span class="lt">${t}</span><span class="lag" style="color:${color}">${name}</span><span class="lmsg">${msg}</span></div>`;
  const dl=document.getElementById('ll');
  dl.insertAdjacentHTML('afterbegin',html);
  while(dl.children.length>100)dl.removeChild(dl.lastChild);
  const ml=document.getElementById('mlog');
  if(ml){ml.insertAdjacentHTML('afterbegin',html.replace('le','le').replace('lt','lt').replace('lag','lag').replace('lmsg','lmsg'));
  while(ml.children.length>60)ml.removeChild(ml.lastChild);}
}

function selectAgent(id){
  G.agents.forEach(a=>a.selected=a.id===id);
  G.selectedAgent=id;G.selectedRoom=null;
  updateUI();
  focusAgent(id);
}
function selectRoom(id){
  G.agents.forEach(a=>a.selected=false);
  G.selectedAgent=null;G.selectedRoom=id;
  updateUI();
}
function clearSelection(){
  G.agents.forEach(a=>a.selected=false);
  G.selectedAgent=null;G.selectedRoom=null;
  updateUI();
}

function focusAgent(id){
  const ag=G.agents.find(a=>a.id===id);if(!ag)return;
  const sp=ts(ag.x,ag.y);
  const targetCamX=CW/2-sp.x+cam.x;
  const targetCamY=CH/2-sp.y+cam.y;
  // Smooth pan
  const steps=20;let step=0;
  const sx=cam.x,sy=cam.y;
  const dx=(targetCamX)/steps,dy=(targetCamY)/steps;
  function pan(){if(step++<steps){cam.x=sx+dx*step;cam.y=sy+dy*step;requestAnimationFrame(pan);}}
  pan();
}

function openRoomModal(roomId,forceAgent){

  const ag=forceAgent||G.agents.find(a=>a.home===roomId)||G.agents.find(a=>{const rid=a.tRoom==='__home__'?a.home:a.tRoom;return rid===roomId;});
  curModal={roomId,sd};

    const mn=document.getElementById('m-aname');mn.textContent=`${ag.name} — ${ag.role}`;mn.style.color=ag.color;

  document.getElementById('ms-a').textContent=sd?.stats.acc||'—';
  document.getElementById('ms-l').textContent=sd?.stats.lat||'—';
  const btn=document.getElementById('run-btn');btn.disabled=false;btn.textContent='▶ DISPATCH TASK';
  simulateOutput(roomId);

function closeModal(){
  document.getElementById('modal').classList.add('h');
  if(typeInt){clearTimeout(typeInt);typeInt=null;}curModal=null;
}

let curModal=null,typeInt=null,outIdx={};
function simulateOutput(roomId){
  if(typeInt){clearTimeout(typeInt);typeInt=null;}
  const sd=SD[roomId];if(!sd)return;
  if(!(roomId in outIdx))outIdx[roomId]=0;
  const out=document.getElementById('m-out');
  const text=sd.outs[outIdx[roomId]++%sd.outs.length];
  out.textContent='';let i=0;
  function next(){
    if(i<text.length){out.textContent+=text[i++];out.scrollTop=out.scrollHeight;typeInt=setTimeout(next,14);}
    else{typeInt=setTimeout(()=>{if(curModal&&curModal.roomId===roomId)simulateOutput(roomId);},3500);}
  }
  next();
}

function runTask(){
  if(!curModal)return;
  const{roomId}=curModal;const sd=SD[roomId];
  const btn=document.getElementById('run-btn');btn.disabled=true;btn.textContent='⟳ DISPATCHING…';
  if(typeInt){clearTimeout(typeInt);typeInt=null;}
  const ag=G.agents.find(a=>a.home===roomId);
  if(ag){ag.flash();ag.say('Running task…');}
  if(sd){sd.stats.tasks++;G.taskCount++;}
  document.getElementById('ms-t').textContent=sd?.stats.tasks||0;
  addLog(ag?ag.name:'SYS',ag?ag.color:'#00d4ff',`Manual task dispatch → ${getRoomById(roomId)?.name}`);
  setTimeout(()=>{btn.disabled=false;btn.textContent='▶ DISPATCH TASK';simulateOutput(roomId);},1200);
}

// ══════════════════════════════════════════════════════════════
//  INPUT: DRAG, CLICK, RIGHTCLICK, PAN, TOUCH
// ══════════════════════════════════════════════════════════════
let mouseX=0,mouseY=0,mouseDown=false;
let dragStartX=0,dragStartY=0;
const DRAG_THRESHOLD=6;

function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}

function hitAgent(mx,my){
  const hitR=Math.max(16,TW*.28);
  let best=null,bd=Infinity;
  for(const ag of G.agents){
    const sp=ts(ag.x,ag.y);
    const d=Math.hypot(mx-sp.x,my-(sp.y+TH/2-TH*.3));
    if(d<hitR&&d<bd){bd=d;best=ag;}
  }
  return best;
}

function hitRoom(mx,my){
  // Convert screen→grid and find room
  const{gx,gy}=sg(mx,my);
  const igx=Math.floor(gx),igy=Math.floor(gy);
  return getRoomAt(igx,igy)||null;
}

canvas.addEventListener('mousedown',e=>{
  mouseDown=true;
  const{x,y}=getCanvasPos(e);
  dragStartX=x;dragStartY=y;
  mouseX=x;mouseY=y;

  if(e.button===2){e.preventDefault();return;}

  const ag=hitAgent(x,y);
  if(ag){
    selectAgent(ag.id);
    G.dragAgent=ag;
    G.dragging=false; // will become true on move
  } else {
    // Start pan
    G.panning=true;
    G.panStartX=x;G.panStartY=y;
    G.panStartCamX=cam.x;G.panStartCamY=cam.y;
  }
});

canvas.addEventListener('mousemove',e=>{
  const{x,y}=getCanvasPos(e);
  mouseX=x;mouseY=y;

  // Tooltip
  const tt=document.getElementById('tt');
  const ag=hitAgent(x,y);
  const room=hitRoom(x,y);
  if(ag){
    tt.textContent=`${ag.name} — ${ag.role} [${ag.badge.t}]`;
    tt.style.display='block';tt.style.left=(x+10)+'px';tt.style.top=(y-24)+'px';
    canvas.className='pointer';
  } else if(room){
    tt.textContent=`${room.icon||''} ${room.name}`;
    tt.style.display='block';tt.style.left=(x+10)+'px';tt.style.top=(y-24)+'px';
    canvas.className='pointer';
  } else{tt.style.display='none';canvas.className=mouseDown?'grabbing':'grab';}

  if(!mouseDown)return;

  const dist=Math.hypot(x-dragStartX,y-dragStartY);

  // Agent drag
  if(G.dragAgent&&dist>DRAG_THRESHOLD){
    G.dragging=true;
    canvas.className='move-cur';
    const{gx,gy}=sg(x,y);
    G.dragGX=gx;G.dragGY=gy;
  }
  // Camera pan
  else if(G.panning&&!G.dragAgent){
    cam.x=G.panStartCamX+(x-G.panStartX);
    cam.y=G.panStartCamY+(y-G.panStartY);
  }
});

canvas.addEventListener('mouseup',e=>{
  const{x,y}=getCanvasPos(e);
  mouseDown=false;

  if(G.dragging&&G.dragAgent){
    // Drop agent at grid position
    const ag=G.dragAgent;
    const{gx,gy}=sg(x,y);
    const igx=Math.floor(gx),igy=Math.floor(gy);
    const room=getRoomAt(igx,igy);
    if(room&&room.id!==ag.tRoom){
      ag.sendTo(room.id);
      ag.flash();
      addLog(ag.name,ag.color,`→ Dropped into ${room.name}`);
      updateUI();
    } else if(!room){
      // Drop in hallway — wander
      ag.tx=gx;ag.ty=gy;ag.tRoom='__hall__';ag.state='walking';
      addLog(ag.name,ag.color,'→ Moving to hallway');
    }
    G.dragging=false;G.dragAgent=null;
    canvas.className='grab';
    return;
  }

  G.dragging=false;G.dragAgent=null;
  G.panning=false;

  // Click (no significant movement)
  const dist=Math.hypot(x-dragStartX,y-dragStartY);
  if(dist<DRAG_THRESHOLD){
    const ag=hitAgent(x,y);
    if(ag){selectAgent(ag.id);return;}
    const room=hitRoom(x,y);
    if(room){selectRoom(room.id);return;}
    clearSelection();
  }
  canvas.className='grab';
});

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const{x,y}=getCanvasPos(e);
  const ag=hitAgent(x,y);
  if(ag){agentCtxMenu(ag,e.clientX,e.clientY);return;}
  const room=hitRoom(x,y);
  if(room){roomCtxMenu(room,e.clientX,e.clientY);}
});

// Touch events
let lastTap=0,touchId=null,touchStartX=0,touchStartY=0,touchPanStart=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const{x,y}=getCanvasPos(e);
  touchStartX=x;touchStartY=y;touchId=e.touches[0].identifier;
  const ag=hitAgent(x,y);
  if(ag){G.dragAgent=ag;G.dragging=false;selectAgent(ag.id);}
  else{
    G.panning=true;G.panStartX=x;G.panStartY=y;G.panStartCamX=cam.x;G.panStartCamY=cam.y;
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const{x,y}=getCanvasPos(e);
  const dist=Math.hypot(x-touchStartX,y-touchStartY);
  if(G.dragAgent&&dist>8){
    G.dragging=true;
    const{gx,gy}=sg(x,y);G.dragGX=gx;G.dragGY=gy;
  } else if(G.panning&&!G.dragAgent){
    cam.x=G.panStartCamX+(x-G.panStartX);
    cam.y=G.panStartCamY+(y-G.panStartY);
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const touch=e.changedTouches[0];
  const r=canvas.getBoundingClientRect();
  const x=touch.clientX-r.left,y=touch.clientY-r.top;

  if(G.dragging&&G.dragAgent){
    const ag=G.dragAgent;
    const{gx,gy}=sg(x,y);
    const igx=Math.floor(gx),igy=Math.floor(gy);
    const room=getRoomAt(igx,igy);
    if(room){ag.sendTo(room.id);ag.flash();addLog(ag.name,ag.color,`→ Dropped into ${room.name}`);}
    G.dragging=false;G.dragAgent=null;G.panning=false;updateUI();
    return;
  }
  G.dragging=false;G.dragAgent=null;G.panning=false;

  const dist=Math.hypot(x-touchStartX,y-touchStartY);
  if(dist<10){
    // Long press → context menu (handled via 500ms timer)
    const now=Date.now();
    if(now-lastTap<300){
      // Double tap → open modal
      const room=hitRoom(x,y);if(room)openRoomModal(room.id);
    } else {
      const ag=hitAgent(x,y);
      if(ag)selectAgent(ag.id);
      else{const room=hitRoom(x,y);if(room)selectRoom(room.id);else clearSelection();}
    }
    lastTap=now;
  }
},{passive:false});

// Mobile drag handle
(function(){
  const btm=document.getElementById('mbtm'),dh=document.getElementById('dh');
  let drag=false,sy=0,sh=0;
  const MIN=80,getMax=()=>Math.min(window.innerHeight*.7,380);
  const start=e=>{if(window.innerWidth>=768)return;drag=true;sy=e.touches?e.touches[0].clientY:e.clientY;sh=btm.offsetHeight;e.preventDefault?.();};
  const move=e=>{if(!drag)return;e.preventDefault?.();const cy=e.touches?e.touches[0].clientY:e.clientY;btm.style.height=Math.min(getMax(),Math.max(MIN,sh+(sy-cy)))+'px';doResize();};
  const end=()=>{drag=false;};
  dh.addEventListener('touchstart',start,{passive:false});dh.addEventListener('mousedown',start);
  document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',end);
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',end);
})();

// ══════════════════════════════════════════════════════════════
//  COLLAB PACKET SPAWNER
// ══════════════════════════════════════════════════════════════
function maybeSpawnPacket(){
  // Occasionally spawn a data packet between collaborating agents
  if(G.tick%90!==0)return;
  const cb=COLLAB[Math.floor(Math.random()*COLLAB.length)];
  const a=G.agents.find(ag=>ag.id===cb.a);
  const b=G.agents.find(ag=>ag.id===cb.b);
  if(a&&b&&(a.state==='working'||b.state==='working')){
    spawnPacket(a,b,a.color);
    if(Math.random()<.3){a.say(cb.msg.split('→')[0].trim());}
  }
}

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════
let lastSec=0,uiFrame=0;
function loop(ts){
  G.tick++;
  G.agents.forEach(a=>a.update());
  updatePackets();
  maybeSpawnPacket();
  render();
  if(++uiFrame>=10){uiFrame=0;updateUI();}
  if(ts-lastSec>1000){G.uptime++;lastSec=ts;}
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
function init(){
  doResize();
  window.addEventListener('resize',()=>{doResize();updateUI();});
  window.addEventListener('orientationchange',()=>setTimeout(()=>{doResize();updateUI();},250));
  G.agents=AGENT_DEFS.map(d=>new Agent(d));
  G.agents.forEach((ag,i)=>ag.idleTimer=30+i*45);
  // roundRect polyfill
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
      this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();
    };
  }
  addLog('SYSTEM','#00d4ff','Lumen Clinical AI Hospital — v0.2 initialized');
  addLog('SYSTEM','#00d4ff','6 agents · 19 rooms · Full interaction system active');
  addLog('SYSTEM','#00ff9f','DRAG agents between rooms · RIGHT-CLICK for actions · CLICK to inspect');
  updateUI();
  requestAnimationFrame(loop);
}
init();
</script>

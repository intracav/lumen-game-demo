<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lumen — Clinical AI Department</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#030810;--panel:#060d1a;--border:#112240;--border2:#1c3a66;
  --cyan:#00d4ff;--green:#00ff9f;--amber:#ffaa00;--red:#ff3355;
  --purple:#bb66ff;--pink:#ff4488;--blue:#4499ff;
  --text:#7aa8c8;--text-hi:#c8e8ff;
  --mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;
  --topbar-h:52px;--rpanel-w:258px;--bpanel-h:140px;
  --mobile-tab-h:44px;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden;touch-action:none;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* TOP BAR */
#topbar{height:var(--topbar-h);background:rgba(6,13,26,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10;}
#logo{display:flex;align-items:center;gap:9px;margin-right:4px;}
.logo-mark{width:30px;height:30px;background:var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:bold;color:var(--bg);flex-shrink:0;}
.logo-text .name{font-family:var(--mono);font-size:13px;letter-spacing:4px;color:var(--text-hi);line-height:1;}
.logo-text .sub{font-size:8px;letter-spacing:2px;color:var(--text);margin-top:1px;}
.chip{display:flex;align-items:center;gap:5px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.18);border-radius:4px;padding:3px 8px;font-family:var(--mono);font-size:10px;white-space:nowrap;}
.chip .lbl{color:var(--text);}.chip .val{color:var(--cyan);}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.clock{font-family:var(--mono);font-size:14px;color:var(--cyan);letter-spacing:2px;}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden;min-height:0;}

/* CANVAS */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#gc{display:block;touch-action:none;}
#tooltip{position:absolute;background:rgba(6,13,26,.95);border:1px solid var(--border2);border-radius:5px;padding:5px 9px;font-family:var(--mono);font-size:10px;color:var(--cyan);pointer-events:none;display:none;z-index:20;letter-spacing:1px;}

/* RIGHT PANEL */
#rpanel{width:var(--rpanel-w);background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--cyan);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ph::before{content:'';width:3px;height:12px;background:var(--cyan);display:block;border-radius:2px;}
#agent-list{flex:1;overflow-y:auto;padding:7px;}
#agent-list::-webkit-scrollbar{width:2px;}
#agent-list::-webkit-scrollbar-thumb{background:var(--border);}

/* BOTTOM LOG */
#bpanel{height:var(--bpanel-h);background:var(--panel);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#log-list{flex:1;overflow-y:auto;padding:4px 14px 6px;}
#log-list::-webkit-scrollbar{width:2px;}
#log-list::-webkit-scrollbar-thumb{background:var(--border);}

/* SHARED AGENT CARD */
.acard{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:5px;padding:8px 10px;margin-bottom:5px;cursor:pointer;transition:all .15s;}
.acard:hover,.acard:active{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.05);}
.acard.on{border-color:rgba(0,212,255,.45);background:rgba(0,212,255,.07);}
.acard-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.aname{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text-hi);flex:1;}
.abadge{font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:3px;letter-spacing:1px;}
.b-work{background:rgba(0,255,159,.1);color:var(--green);border:1px solid rgba(0,255,159,.3);}
.b-walk{background:rgba(255,170,0,.1);color:var(--amber);border:1px solid rgba(255,170,0,.3);}
.b-idle{background:rgba(120,168,200,.08);color:var(--text);border:1px solid rgba(120,168,200,.18);}
.arole{font-size:10px;color:var(--text);margin-bottom:3px;letter-spacing:.5px;}
.atask{font-size:10px;color:var(--cyan);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.8;}
.aprog{height:2px;background:var(--border);border-radius:1px;margin-top:5px;overflow:hidden;}
.aprog-fill{height:100%;border-radius:1px;transition:width .3s;}

/* LOG ENTRY */
.lentry{display:flex;align-items:baseline;gap:8px;padding:2px 0;font-family:var(--mono);font-size:10px;border-bottom:1px solid rgba(17,34,64,.4);}
.ltime{color:rgba(120,168,200,.4);min-width:50px;}.lagent{min-width:42px;font-weight:bold;}.lmsg{color:var(--text);flex:1;opacity:.9;font-size:9.5px;}

/* MOBILE BOTTOM SHEET */
#mobile-btm{display:none;flex-direction:column;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;overflow:hidden;}
#drag-handle{width:100%;height:20px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;flex-shrink:0;}
#drag-handle::before{content:'';width:32px;height:3px;background:var(--border2);border-radius:3px;}
#mobile-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.mtab{flex:1;height:var(--mobile-tab-h);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--text);cursor:pointer;border:none;background:none;transition:all .15s;gap:6px;border-bottom:2px solid transparent;}
.mtab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.mtab-icon{font-size:13px;}
#mobile-content{flex:1;overflow:hidden;min-height:0;}
#mobile-agents,#mobile-log{display:none;height:100%;overflow-y:auto;padding:6px 8px;}
#mobile-agents::-webkit-scrollbar,#mobile-log::-webkit-scrollbar{width:2px;}
#mobile-agents::-webkit-scrollbar-thumb,#mobile-log::-webkit-scrollbar-thumb{background:var(--border);}
#mobile-agents.active,#mobile-log.active{display:block;}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(3,8,16,.88);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px);padding:16px;}
#modal.hidden{display:none;}
.modal-box{width:100%;max-width:560px;background:#07101f;border:1px solid var(--border2);border-radius:9px;overflow:hidden;box-shadow:0 0 80px rgba(0,212,255,.1);max-height:calc(100dvh - 32px);display:flex;flex-direction:column;}
.mh{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border);background:rgba(0,212,255,.025);flex-shrink:0;}
.mh-icon{font-size:20px;}.mh-title{flex:1;}
.mh-title h2{font-family:var(--mono);font-size:12px;letter-spacing:2px;color:var(--text-hi);font-weight:normal;}
.mh-title p{font-size:10px;color:var(--text);margin-top:2px;}
.mbtn{background:none;border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0;}
.mbtn:hover,.mbtn:active{border-color:var(--red);color:var(--red);}
.mb{padding:13px 16px;overflow-y:auto;flex:1;}
.mb::-webkit-scrollbar{width:2px;}
.mb::-webkit-scrollbar-thumb{background:var(--border);}
.magent{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:4px;margin-bottom:10px;}
.madot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.maname{font-family:var(--mono);font-size:11px;color:var(--text-hi);flex:1;}
.live-tag{font-family:var(--mono);font-size:8px;color:var(--green);border:1px solid rgba(0,255,159,.35);padding:2px 5px;border-radius:3px;animation:blink 1.4s infinite;letter-spacing:1px;flex-shrink:0;}
.ai-out{background:#020710;border:1px solid rgba(0,212,255,.12);border-radius:4px;padding:11px;font-family:var(--mono);font-size:10px;color:var(--green);min-height:110px;max-height:150px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;}
.ai-out::-webkit-scrollbar{width:2px;}
.ai-out::-webkit-scrollbar-thumb{background:var(--border);}
.mstats{display:flex;gap:7px;margin-top:10px;}
.ms{flex:1;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;padding:7px;text-align:center;}
.ms .v{font-family:var(--mono);font-size:16px;color:var(--cyan);display:block;}
.ms .l{font-size:8px;color:var(--text);letter-spacing:1px;margin-top:1px;}
.run-btn{margin-top:10px;width:100%;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.3);color:var(--cyan);font-family:var(--mono);font-size:11px;letter-spacing:2px;padding:10px;border-radius:4px;cursor:pointer;transition:all .2s;}
.run-btn:hover,.run-btn:active{background:rgba(0,212,255,.15);border-color:var(--cyan);}
.run-btn:disabled{opacity:.4;cursor:default;}

/* RESPONSIVE */
@media(max-width:767px){
  :root{--topbar-h:46px;}
  #rpanel,#bpanel{display:none;}
  #mobile-btm{display:flex;height:220px;}
  .chip.d-only{display:none;}
  .logo-text .sub{display:none;}
}
@media(max-width:380px){
  :root{--topbar-h:42px;}
  .logo-mark{width:26px;height:26px;font-size:12px;}
  .logo-text .name{font-size:11px;letter-spacing:2px;}
  .clock{font-size:11px;}
}
@media(orientation:landscape)and(max-height:480px){
  #mobile-btm{height:130px!important;}
  .ai-out{min-height:70px;max-height:80px;}
}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="logo">
      <div class="logo-mark">L</div>
      <div class="logo-text"><div class="name">LUMEN</div><div class="sub">CLINICAL AI PLATFORM</div></div>
    </div>
    <div class="chip d-only"><span class="lbl">DEPT</span><span class="val">CARDIOLOGY · ICU</span></div>
    <div class="chip"><div class="pulse-dot"></div><span class="val" id="sc-agents">6 ACTIVE</span></div>
    <div class="chip d-only"><span class="lbl">TASKS</span><span class="val" id="sc-tasks">0</span></div>
    <div class="chip d-only"><span class="lbl">UPTIME</span><span class="val" id="sc-uptime">00:00:00</span></div>
    <div id="topbar-right">
      <div class="chip d-only"><span class="lbl">ENV</span><span class="val">v0.1</span></div>
      <div class="clock" id="clock">00:00:00</div>
    </div>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="gc"></canvas>
      <div id="tooltip"></div>
    </div>
    <div id="rpanel">
      <div class="ph">AGENT ROSTER</div>
      <div id="agent-list"></div>
    </div>
  </div>

  <div id="bpanel">
    <div class="ph">ACTIVITY LOG</div>
    <div id="log-list"></div>
  </div>

  <!-- MOBILE BOTTOM SHEET -->
  <div id="mobile-btm">
    <div id="drag-handle"></div>
    <div id="mobile-tabs">
      <button class="mtab active" data-tab="agents" onclick="switchTab('agents')"><span class="mtab-icon">🤖</span>AGENTS</button>
      <button class="mtab" data-tab="log" onclick="switchTab('log')"><span class="mtab-icon">📡</span>LOG</button>
    </div>
    <div id="mobile-content">
      <div id="mobile-agents" class="active"></div>
      <div id="mobile-log"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <div class="mh">
      <span class="mh-icon" id="m-icon">💻</span>
      <div class="mh-title"><h2 id="m-title">STATION</h2><p id="m-sub">Task type</p></div>
      <button class="mbtn" onclick="closeModal()">✕</button>
    </div>
    <div class="mb">
      <div class="magent">
        <div class="madot" id="m-adot"></div>
        <span class="maname" id="m-aname">Agent</span>
        <span class="live-tag">● LIVE</span>
      </div>
      <div class="ai-out" id="m-out"></div>
      <div class="mstats">
        <div class="ms"><span class="v" id="ms-tasks">0</span><div class="l">TASKS</div></div>
        <div class="ms"><span class="v" id="ms-acc">—</span><div class="l">ACCURACY</div></div>
        <div class="ms"><span class="v" id="ms-lat">—</span><div class="l">LATENCY</div></div>
      </div>
      <!-- TODO Lumen: POST /api/v1/agents/{id}/run · stream SSE response into #m-out -->
      <button class="run-btn" id="run-btn" onclick="runTask()">▶ DISPATCH NEW TASK</button>
    </div>
  </div>
</div>

<script>

// TILE SIZE — responsive
// ══════════════════════════════════════════════════════
const GW=16,GH=12,SPEED=0.038;
let TW,TH;

function getTileSize(){
  const w=window.innerWidth,h=window.innerHeight;
  const isLandSmall=w<768&&h<480;
  const isMobile=w<768;
  if(isLandSmall)return{TW:40,TH:20};
  if(isMobile)   return{TW:46,TH:23};
  return               {TW:68,TH:34};
}

// CANVAS
// ══════════════════════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let CW,CH,OX,OY;

function resize(){
  const t=getTileSize();TW=t.TW;TH=t.TH;
  const wrap=document.getElementById('canvas-wrap');
  CW=wrap.clientWidth;CH=wrap.clientHeight;
  canvas.width=CW;canvas.height=CH;
  const isMob=window.innerWidth<768;
  OX=CW/2+(isMob?0:20);
  OY=isMob?38:55;
}

function ts(gx,gy){return{x:(gx-gy)*(TW/2)+OX,y:(gx+gy)*(TH/2)+OY};}

// ══════════════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════════════
function tile(gx,gy,fill,stroke){
  const{x,y}=ts(gx,gy);const hw=TW/2,hh=TH/2;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+hw,y+hh);ctx.lineTo(x,y+TH);ctx.lineTo(x-hw,y+hh);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=.6;ctx.stroke();}
}

function isoBox(gx,gy,bh,rf,lf,tf,ol){
  const{x,y}=ts(gx,gy);const hw=TW/2,hh=TH/2;
  // right
  ctx.beginPath();ctx.moveTo(x+hw,y+hh-bh);ctx.lineTo(x,y+TH-bh);ctx.lineTo(x,y+TH);ctx.lineTo(x+hw,y+hh);ctx.closePath();
  ctx.fillStyle=rf;ctx.fill();if(ol){ctx.strokeStyle=ol;ctx.lineWidth=.5;ctx.stroke();}
  // left
  ctx.beginPath();ctx.moveTo(x-hw,y+hh-bh);ctx.lineTo(x,y+TH-bh);ctx.lineTo(x,y+TH);ctx.lineTo(x-hw,y+hh);ctx.closePath();
  ctx.fillStyle=lf;ctx.fill();if(ol){ctx.strokeStyle=ol;ctx.lineWidth=.5;ctx.stroke();}
  // top
  ctx.beginPath();ctx.moveTo(x,y-bh);ctx.lineTo(x+hw,y+hh-bh);ctx.lineTo(x,y+TH-bh);ctx.lineTo(x-hw,y+hh-bh);ctx.closePath();
  ctx.fillStyle=tf;ctx.fill();if(ol){ctx.strokeStyle=ol;ctx.lineWidth=.5;ctx.stroke();}
}

function drawStation(st){
  const{gx,gy,c,cd,cdd,id}=st;
  const{x,y}=ts(gx,gy);
  const hw=TW*.42,hh=TH*.42;
  const dh=Math.round(TH*.5);
  const wA=G.agents.find(a=>a.state==='working'&&a.tStation===id);
  const glow=wA?.55+.45*Math.sin(G.tick*.09):.18;

  tile(gx,gy,'#0c1a2e','#162a48');

  ctx.beginPath();ctx.moveTo(x+hw,y+hh-dh);ctx.lineTo(x,y+2*hh-dh);ctx.lineTo(x,y+2*hh);ctx.lineTo(x+hw,y+hh);ctx.closePath();
  ctx.fillStyle=cdd;ctx.fill();ctx.strokeStyle=c+'55';ctx.lineWidth=.6;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-hw,y+hh-dh);ctx.lineTo(x,y+2*hh-dh);ctx.lineTo(x,y+2*hh);ctx.lineTo(x-hw,y+hh);ctx.closePath();
  ctx.fillStyle=cd;ctx.fill();ctx.strokeStyle=c+'55';ctx.lineWidth=.6;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-dh);ctx.lineTo(x+hw,y+hh-dh);ctx.lineTo(x,y+2*hh-dh);ctx.lineTo(x-hw,y+hh-dh);ctx.closePath();
  ctx.fillStyle=c;ctx.globalAlpha=.25+glow*.35;ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle=c+'88';ctx.lineWidth=.8;ctx.stroke();

  const mh=Math.max(8,TH*.32);const my2=y-dh-mh;const mw=Math.max(6,TW*.12);const mhh=Math.max(4,TH*.16);
  ctx.beginPath();ctx.moveTo(x-mw,my2+mhh-mh);ctx.lineTo(x,my2+2*mhh-mh);ctx.lineTo(x,my2+2*mhh);ctx.lineTo(x-mw,my2+mhh);ctx.closePath();ctx.fillStyle=cdd;ctx.globalAlpha=.9;ctx.fill();ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(x+mw,my2+mhh-mh);ctx.lineTo(x,my2+2*mhh-mh);ctx.lineTo(x,my2+2*mhh);ctx.lineTo(x+mw,my2+mhh);ctx.closePath();ctx.fillStyle=cd;ctx.globalAlpha=.9;ctx.fill();ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(x,my2-mh);ctx.lineTo(x+mw,my2+mhh-mh);ctx.lineTo(x,my2+2*mhh-mh);ctx.lineTo(x-mw,my2+mhh-mh);ctx.closePath();
  if(wA){ctx.shadowColor=c;ctx.shadowBlur=12;ctx.fillStyle=c;ctx.globalAlpha=.85+.15*Math.sin(G.tick*.12);}
  else{ctx.fillStyle='#1a3050';ctx.globalAlpha=.7;}
  ctx.fill();ctx.globalAlpha=1;ctx.shadowBlur=0;

  const fs=Math.max(7,TW*.115);
  ctx.font=`${fs}px var(--mono)`;ctx.textAlign='center';ctx.fillStyle=c;ctx.globalAlpha=.85;
  ctx.fillText(st.name,x,y-dh-mh*2-7);ctx.globalAlpha=1;

  if(wA){
    const pr=3+1.5*Math.sin(G.tick*.12);
    ctx.beginPath();ctx.arc(x,y-dh-mh*2-15,pr,0,Math.PI*2);
    ctx.fillStyle=c;ctx.globalAlpha=.5+.5*Math.sin(G.tick*.12);ctx.fill();ctx.globalAlpha=1;
  }
}

function drawAgent(ag){
  const s=ts(ag.x,ag.y);const px=s.x,py=s.y+TH/2-2;
  const sc=TW/68;
  const bob=ag.state==='working'?Math.sin(G.tick*.18)*2:0;
  const wlk=ag.state==='walking'?Math.sin(G.tick*.22)*2.5:0;
  const H=Math.round(36*sc);const oy=py-H+bob+wlk;

  ctx.beginPath();ctx.ellipse(px,py,8*sc,3.5*sc,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.5)';ctx.fill();

  const ls=ag.state==='walking'?Math.sin(G.tick*.22)*3:0;
  ctx.fillStyle='#111e30';
  ctx.fillRect(px-5*sc+ls,oy+22*sc,4*sc,8*sc);
  ctx.fillRect(px+1*sc-ls,oy+22*sc,4*sc,8*sc);

  ctx.fillStyle='#deeeff';
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(px-7*sc,oy+10*sc,14*sc,13*sc,2);else ctx.rect(px-7*sc,oy+10*sc,14*sc,13*sc);ctx.fill();

  if(ag.state==='working'){ctx.shadowColor=ag.color;ctx.shadowBlur=10;}
  ctx.fillStyle=ag.color;ctx.fillRect(px-3*sc,oy+12*sc,6*sc,9*sc);ctx.shadowBlur=0;

  ctx.fillStyle='#deeeff';ctx.fillRect(px-11*sc,oy+11*sc,4*sc,7*sc);ctx.fillRect(px+7*sc,oy+11*sc,4*sc,7*sc);
  ctx.fillStyle='#e8c9a0';ctx.fillRect(px-2*sc,oy+6*sc,4*sc,5*sc);

  ctx.shadowColor=ag.color;ctx.shadowBlur=ag.state==='working'?12:4;
  ctx.beginPath();ctx.arc(px,oy+4*sc,6*sc,0,Math.PI*2);ctx.fillStyle='#e8c9a0';ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(px,oy+2*sc,6*sc,-Math.PI,0);ctx.fillStyle=ag.color;ctx.fill();

  if(TW>=40){
    const fs=Math.max(6,8*sc);
    ctx.font=`bold ${fs}px var(--mono)`;ctx.textAlign='center';ctx.fillStyle=ag.color;ctx.shadowColor=ag.color;ctx.shadowBlur=5;
    ctx.fillText(ag.name,px,oy-3*sc);ctx.shadowBlur=0;
  }

  if(ag.state==='working'){
    for(const p of ag.particles){
      ctx.beginPath();ctx.arc(px+p.ox,oy-p.life*22*sc,1.5*sc,0,Math.PI*2);
      ctx.fillStyle=ag.color;ctx.globalAlpha=Math.max(0,1-p.life);ctx.fill();ctx.globalAlpha=1;
    }
  }
}

function drawPath(ag){
  if(ag.state!=='walking')return;
  const f=ts(ag.x,ag.y),t=ts(ag.tx,ag.ty);
  ctx.beginPath();ctx.moveTo(f.x,f.y+TH/2);ctx.lineTo(t.x,t.y+TH/2);
  ctx.strokeStyle=ag.color+'44';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
}

function renderRoom(){
  const BH_BACK=38*(TH/34),BH_SIDE=28*(TH/34);
  for(let sum=0;sum<=GW+GH-2;sum++){
    for(let gx=0;gx<GW;gx++){
      const gy=sum-gx;if(gy<0||gy>=GH)continue;
      if(gy===0){
        isoBox(gx,gy,BH_BACK,'#080e20','#060f1e','#0c1c30','#1a3050');
      } else if(gx===0){
        const{x,y}=ts(gx,gy);const hw=TW/2,hh=TH/2;
        ctx.beginPath();ctx.moveTo(x-hw,y+hh-BH_SIDE);ctx.lineTo(x,y+TH-BH_SIDE);ctx.lineTo(x,y+TH);ctx.lineTo(x-hw,y+hh);ctx.closePath();ctx.fillStyle='#04090e';ctx.fill();ctx.strokeStyle='#142030';ctx.lineWidth=.5;ctx.stroke();
        ctx.beginPath();ctx.moveTo(x,y-BH_SIDE);ctx.lineTo(x+hw,y+hh-BH_SIDE);ctx.lineTo(x,y+TH-BH_SIDE);ctx.lineTo(x-hw,y+hh-BH_SIDE);ctx.closePath();ctx.fillStyle='#0a1828';ctx.fill();ctx.strokeStyle='#1a3050';ctx.lineWidth=.5;ctx.stroke();
      } else {
        const alt=(gx+gy)%2===0;
        const isPath=gy===5||gx===4||gx===9;
        tile(gx,gy,isPath?'#0d1e34':(alt?'#0c1b2e':'#0a1626'),isPath?'#1a3a60':'#132240');
        if(isPath){const{x,y}=ts(gx,gy);ctx.beginPath();ctx.arc(x,y+TH/2,1.5,0,Math.PI*2);ctx.fillStyle='#1a3a60';ctx.globalAlpha=.6;ctx.fill();ctx.globalAlpha=1;}
      }
    }
  }
}

// ══════════════════════════════════════════════════════
// AGENT CLASS
// ══════════════════════════════════════════════════════
const TASK_LABELS=['Processing batch input','Running inference pipeline','Validating output schema','Cross-referencing clinical data','Generating structured report','Applying regulatory filters','Updating knowledge index','Executing compliance check'];

class Agent{
  constructor(d){
    this.id=d.id;this.name=d.name;this.role=d.role;this.color=d.color;this.home=d.home;
    const hS=STATIONS.find(s=>s.id===d.home);
    this.x=hS.gx+.4;this.y=hS.gy+2;
    this.state='idle';this.tStation=null;this.tx=this.x;this.ty=this.y;
    this.workTimer=0;this.idleTimer=60+Math.random()*100;
    this.task='';this.taskProgress=0;this.particles=[];this.tasksDone=0;
  }
  update(){
    this.idleTimer--;
    if(this.state==='working'&&G.tick%4===0)this.particles.push({ox:(Math.random()-.5)*14,life:0});
    this.particles=this.particles.map(p=>({...p,life:p.life+.025})).filter(p=>p.life<1);
    if(this.state==='walking'){
      const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.hypot(dx,dy);
      if(d>SPEED){this.x+=dx/d*SPEED;this.y+=dy/d*SPEED;}
      else{
        this.x=this.tx;this.y=this.ty;
        if(this.tStation==='__home__'){this.state='idle';this.task='';this.idleTimer=80+Math.random()*120;}
        else{
          this.state='working';this.workTimer=180+Math.random()*200;this.taskProgress=0;
          const st=STATIONS.find(s=>s.id===this.tStation);
          if(st){st.stats.tasks++;G.taskCount++;this.task=TASK_LABELS[Math.floor(Math.random()*8)];addLog(this.name,this.color,`▶ ${st.name}: ${this.task}`);}
        }
      }
    } else if(this.state==='working'){
      this.workTimer--;this.taskProgress=1-(this.workTimer/350);
      if(this.workTimer<=0){
        this.tasksDone++;
        const st=STATIONS.find(s=>s.id===this.tStation);
        addLog(this.name,this.color,`✓ Complete at ${st?st.name:'station'}`);
        this._goHome();
      }
    } else if(this.state==='idle'&&this.idleTimer<=0){this._dispatch();}
  }
  _goHome(){const hS=STATIONS.find(s=>s.id===this.home);this.tx=hS.gx+.4;this.ty=hS.gy+2;this.tStation='__home__';this.state='walking';}
  _dispatch(){
    let tid;
    if(Math.random()<.72){tid=this.home;}
    else{const ct=CROSS.find(c=>c.from===this.id);if(ct&&Math.random()<.55){tid=ct.to;addLog(this.name,this.color,`⇄ ${ct.msg}`);}else tid=this.home;}
    const st=STATIONS.find(s=>s.id===tid);
    if(st){this.tStation=tid;this.tx=st.gx+.4;this.ty=st.gy+1.8;this.state='walking';addLog(this.name,this.color,`→ Routing to ${st.name}`);}
  }
  get badge(){
    if(this.state==='working')return{t:'WORKING',c:'b-work'};
    if(this.state==='walking')return{t:'ROUTING',c:'b-walk'};
    return{t:'IDLE',c:'b-idle'};
  }
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const G={agents:[],tick:0,taskCount:0,uptime:0};

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,CW,CH);
  const bg=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,CW*.75);
  bg.addColorStop(0,'#060d1c');bg.addColorStop(1,'#020508');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);
  renderRoom();
  [...STATIONS].sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy)).forEach(s=>drawStation(s));
  G.agents.forEach(a=>drawPath(a));
  [...G.agents].sort((a,b)=>(a.x+a.y)-(b.x+b.y)).forEach(a=>drawAgent(a));
  for(let sy=0;sy<CH;sy+=4){ctx.fillStyle='rgba(0,0,0,.05)';ctx.fillRect(0,sy,CW,1);}
  const vig=ctx.createRadialGradient(CW/2,CH/2,CW*.3,CW/2,CH/2,CW*.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,CW,CH);
}

function agentCardHTML(ag){
  const b=ag.badge;
  const prog=ag.state==='working'
    ?`<div class="aprog"><div class="aprog-fill" style="width:${Math.min(100,(ag.taskProgress||0)*100).toFixed(0)}%;background:${ag.color}"></div></div>`:'';
  return`<div class="acard-top"><div class="adot" style="background:${ag.color};box-shadow:0 0 6px ${ag.color}88"></div><span class="aname">${ag.name}</span><span class="abadge ${b.c}">${b.t}</span></div><div class="arole">${ag.role}</div><div class="atask">${ag.task||'Awaiting task assignment...'}</div>${prog}`;
}

function populateList(elId){
  const el=document.getElementById(elId);if(!el)return;
  el.innerHTML='';
  G.agents.forEach(ag=>{
    const card=document.createElement('div');
    card.className=`acard${ag.state==='working'?' on':''}`;
    card.innerHTML=agentCardHTML(ag);
    card.onclick=()=>{const hS=STATIONS.find(s=>s.id===ag.home);if(hS)openModal(hS,ag);};
    el.appendChild(card);
  });
}

let uiTick=0;
function updateUI(){
  const isMob=window.innerWidth<768;
  populateList(isMob?'mobile-agents':'agent-list');
  const active=G.agents.filter(a=>a.state!=='idle').length;
  document.getElementById('sc-agents').textContent=`${active} ACTIVE`;
  const te=document.getElementById('sc-tasks');if(te)te.textContent=G.taskCount;
  const u=G.uptime,ue=document.getElementById('sc-uptime');
  if(ue)ue.textContent=`${String(Math.floor(u/3600)).padStart(2,'0')}:${String(Math.floor(u%3600/60)).padStart(2,'0')}:${String(Math.floor(u%60)).padStart(2,'0')}`;
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
  if(curModal)document.getElementById('ms-tasks').textContent=curModal.stats.tasks;
}

function addLog(name,color,msg){
  const t=new Date().toLocaleTimeString('en-US',{hour12:false});
  function row(cls,tCls,aCls,mCls){
    const r=document.createElement('div');r.className=cls;
    r.innerHTML=`<span class="${tCls}">${t}</span><span class="${aCls}" style="color:${color}">${name}</span><span class="${mCls}">${msg}</span>`;
    return r;
  }
  const dl=document.getElementById('log-list');
  dl.insertBefore(row('lentry','ltime','lagent','lmsg'),dl.firstChild);
  while(dl.children.length>80)dl.removeChild(dl.lastChild);
  const ml=document.getElementById('mobile-log');
  ml.insertBefore(row('lentry','ltime','lagent','lmsg'),ml.firstChild);
  while(ml.children.length>60)ml.removeChild(ml.lastChild);
}

function switchTab(tab){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('mobile-agents').classList.toggle('active',tab==='agents');
  document.getElementById('mobile-log').classList.toggle('active',tab==='log');

(function initDrag(){
  const btm=document.getElementById('mobile-btm');
  const dh=document.getElementById('drag-handle');
  let drag=false,sy=0,sh=0;
  const MIN=88;
  const getMax=()=>Math.min(window.innerHeight*.7,400);

  function start(e){if(window.innerWidth>=768)return;drag=true;sy=e.touches?e.touches[0].clientY:e.clientY;sh=btm.offsetHeight;e.preventDefault();}
  function move(e){
    if(!drag)return;e.preventDefault&&e.preventDefault();
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const nh=Math.min(getMax(),Math.max(MIN,sh+(sy-cy)));
    btm.style.height=nh+'px';
    const wrap=document.getElementById('canvas-wrap');
    CW=wrap.clientWidth;CH=wrap.clientHeight;canvas.width=CW;canvas.height=CH;
    OX=CW/2;OY=38;
  }
  function end(){drag=false;}
  dh.addEventListener('touchstart',start,{passive:false});dh.addEventListener('mousedown',start);
  document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',end);
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',end);
})();

// MODAL
// ══════════════════════════════════════════════════════
let curModal=null,typeInt=null,outputIdx={};

function openModal(st,ag){
  if(!ag)ag=G.agents.find(a=>a.home===st.id);
  curModal=st;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('m-icon').textContent=st.icon;
  document.getElementById('m-title').textContent=st.name;
  document.getElementById('m-sub').textContent=st.taskLabel;
  if(ag){
    const d=document.getElementById('m-adot');d.style.background=ag.color;d.style.boxShadow=`0 0 6px ${ag.color}`;
    const n=document.getElementById('m-aname');n.textContent=`${ag.name} — ${ag.role}`;n.style.color=ag.color;
  }
  document.getElementById('ms-tasks').textContent=st.stats.tasks;
  document.getElementById('ms-acc').textContent=st.stats.acc;
  document.getElementById('ms-lat').textContent=st.stats.lat;
  const btn=document.getElementById('run-btn');btn.disabled=false;btn.textContent='▶ DISPATCH NEW TASK';
  simulateOutput(st);
}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
  if(typeInt){clearTimeout(typeInt);typeInt=null;}curModal=null;
}
function simulateOutput(st){
  if(typeInt){clearTimeout(typeInt);typeInt=null;}
  if(!(st.id in outputIdx))outputIdx[st.id]=0;
  const out=document.getElementById('m-out');
  const text=st.outputs[outputIdx[st.id]++%st.outputs.length];
  out.textContent='';let i=0;
  function next(){
    if(i<text.length){out.textContent+=text[i++];out.scrollTop=out.scrollHeight;typeInt=setTimeout(next,13);}
    else{typeInt=setTimeout(()=>{if(curModal===st)simulateOutput(st);},3200);}
  }
  next();
}
function runTask(){
  if(!curModal)return;
  const btn=document.getElementById('run-btn');btn.disabled=true;btn.textContent='⟳ DISPATCHING...';
  if(typeInt){clearTimeout(typeInt);typeInt=null;}
  const ag=G.agents.find(a=>a.home===curModal.id);
  addLog(ag?ag.name:'SYS',ag?ag.color:'#00d4ff',`Manual dispatch → ${curModal.name}`);
  curModal.stats.tasks++;G.taskCount++;
  document.getElementById('ms-tasks').textContent=curModal.stats.tasks;
  setTimeout(()=>{btn.disabled=false;btn.textContent='▶ DISPATCH NEW TASK';simulateOutput(curModal);},1200);
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ══════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════
function hitTest(mx,my){
  let best=null,bestD=Infinity;
  const R=Math.max(42,TW*.75);
  for(const st of STATIONS){
    const s=ts(st.gx,st.gy);const d=Math.hypot(mx-s.x,my-(s.y+TH/2-8));
    if(d<R&&d<bestD){bestD=d;best=st;}
  }
  return best;
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();const f=hitTest(e.clientX-r.left,e.clientY-r.top);if(f)openModal(f);
});

let lastTap=0;
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.changedTouches.length!==1)return;
  const now=Date.now();if(now-lastTap<300)return;lastTap=now;
  const r=canvas.getBoundingClientRect();const t=e.changedTouches[0];
  const f=hitTest(t.clientX-r.left,t.clientY-r.top);if(f)openModal(f);
},{passive:false});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();const tt=document.getElementById('tooltip');
  const f=hitTest(e.clientX-r.left,e.clientY-r.top);
  if(f){tt.textContent=`${f.icon} ${f.name}`;tt.style.display='block';tt.style.left=(e.clientX-r.left+12)+'px';tt.style.top=(e.clientY-r.top-24)+'px';canvas.style.cursor='pointer';}
  else{tt.style.display='none';canvas.style.cursor='crosshair';}
});

// ══════════════════════════════════════════════════════
// LOOP
// ══════════════════════════════════════════════════════
let lastSec=0;
function loop(ts){
  G.tick++;
  G.agents.forEach(a=>a.update());
  render();
  if(++uiTick>=8){uiTick=0;updateUI();}
  if(ts-lastSec>1000){G.uptime++;lastSec=ts;}
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init(){
  resize();
  window.addEventListener('resize',()=>{resize();updateUI();});
  window.addEventListener('orientationchange',()=>setTimeout(()=>{resize();updateUI();},250));
  G.agents=AGENT_DEFS.map(d=>new Agent(d));
  G.agents.forEach((ag,i)=>{ag.idleTimer=40+i*50;});
  addLog('SYSTEM','#00d4ff','Lumen Clinical AI Dept — v0.1 initialized');
  addLog('SYSTEM','#00d4ff','6 agents online · 6 stations active');
  addLog('SYSTEM','#00ff9f','Tap any station to inspect live AI output');
  updateUI();
  requestAnimationFrame(loop);
}

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();
  };
}

init();
</script>
